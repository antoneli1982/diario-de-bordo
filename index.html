<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diário de Bordo">
<meta name="theme-color" content="#FFD700">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Diário de Bordo — I.A Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFD700;--gold-dark:#E6B800;--gold-light:#FFF0A0;--black:#0A0A0A;--darker:#0D0D0D;--surface:#1A1A1A;--surface2:#222222;--border:#333333;--border-gold:rgba(255,215,0,0.3);--text:#EEEEEE;--text-dim:#888888;--danger:#FF4444;--success:#44FF88;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Exo 2',sans-serif;background:var(--black);color:var(--text);min-height:100vh;width:100%;margin:0;padding:0;}
html{height:100%;width:100%;}
.screen{display:none;min-height:100vh;width:100%;flex-direction:column;}
.screen.active{display:flex;}
/* AUTH */
#auth-screen{align-items:center;justify-content:center;position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;overflow:auto;background:var(--black);}
#auth-screen::before{content:'';position:fixed;width:800px;height:800px;background:radial-gradient(circle,rgba(255,215,0,0.07) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
.auth-box{background:var(--surface);border:1px solid var(--border-gold);border-radius:16px;padding:40px;width:460px;max-width:92vw;position:relative;z-index:1;box-shadow:0 24px 60px rgba(0,0,0,0.8);margin:auto;}
.auth-title{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--gold);letter-spacing:3px;text-transform:uppercase;text-align:center;}
.auth-subtitle{color:var(--text-dim);font-size:12px;text-align:center;margin-top:4px;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;}
.auth-tabs{display:flex;gap:6px;margin-bottom:22px;background:var(--surface2);border-radius:8px;padding:4px;}
.auth-tab{flex:1;padding:9px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Exo 2',sans-serif;transition:all 0.2s;background:transparent;color:var(--text-dim);}
.auth-tab.active{background:var(--gold);color:var(--black);}
/* HEADER */
.header{background:var(--darker);border-bottom:2px solid var(--gold);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0;}
.logo-text{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.logo-sub{font-size:10px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase;}
.header-user{display:flex;align-items:center;gap:10px;}
.user-badge{background:var(--surface);border:1px solid var(--border-gold);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--gold);font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-logout{background:transparent;border:1px solid var(--danger);color:var(--danger);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all 0.2s;}
.btn-logout:hover{background:var(--danger);color:white;}
/* LAYOUT */
.main-layout{display:flex;flex:1;}
.sidebar{width:220px;background:var(--darker);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:13px 20px;cursor:pointer;color:var(--text-dim);font-size:14px;font-weight:500;transition:all 0.2s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,215,0,0.05);color:var(--gold);border-left-color:var(--gold);}
.nav-item.active{background:rgba(255,215,0,0.1);color:var(--gold);border-left-color:var(--gold);}
.content{flex:1;padding:28px;overflow-y:auto;}
/* TYPOGRAPHY */
.page-title{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase;}
.page-subtitle{color:var(--text-dim);font-size:13px;margin-bottom:24px;}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.card-gold{border-color:var(--border-gold);background:linear-gradient(135deg,var(--surface) 0%,rgba(255,215,0,0.03) 100%);}
.card-title{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px;}
/* STATS */
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;transition:all 0.2s;}
.stat-card:hover{border-color:var(--border-gold);transform:translateY(-2px);}
.stat-number{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;color:var(--gold);}
.stat-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
/* BUTTONS */
.btn{padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;font-family:'Exo 2',sans-serif;transition:all 0.2s;border:none;}
.btn-primary{background:var(--gold);color:var(--black);}
.btn-primary:hover{background:var(--gold-light);}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold);}
.btn-x{background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:15px;padding:2px 6px;border-radius:4px;transition:all 0.2s;}
.btn-x:hover{color:var(--danger);background:rgba(255,68,68,0.1);}
/* INPUTS */
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;font-family:'Exo 2',sans-serif;transition:border-color 0.2s;outline:none;}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,215,0,0.1);}
textarea.inp{resize:vertical;min-height:90px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600;}
/* ACTIVITY */
.act-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface2);border-radius:8px;margin-bottom:8px;border:1px solid var(--border);}
.act-dot{width:8px;height:8px;background:var(--gold);border-radius:50%;flex-shrink:0;}
.act-text{flex:1;font-size:14px;}
/* MESSAGES */
.msg-list{max-height:360px;overflow-y:auto;margin-bottom:16px;}
.msg-bubble{padding:12px 16px;border-radius:10px;margin-bottom:10px;max-width:80%;}
.msg-sent{background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.25);margin-left:auto;}
.msg-recv{background:var(--surface2);border:1px solid var(--border);}
.msg-meta{font-size:11px;color:var(--text-dim);margin-bottom:4px;}
/* TAGS */
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;}
.tag-gold{background:rgba(255,215,0,0.12);color:var(--gold);border:1px solid rgba(255,215,0,0.3);}
.tag-success{background:rgba(68,255,136,0.1);color:var(--success);border:1px solid rgba(68,255,136,0.3);}
/* TABLE */
table.tbl{width:100%;border-collapse:collapse;}
table.tbl th{text-align:left;padding:11px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold);border-bottom:1px solid var(--border-gold);background:rgba(255,215,0,0.04);}
table.tbl td{padding:11px 14px;font-size:14px;border-bottom:1px solid var(--border);}
/* CALENDAR */
.calendar{background:var(--surface2);border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.cal-hdr{background:var(--gold);color:var(--black);display:flex;align-items:center;justify-content:space-between;padding:12px 16px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;}
.cal-nav{background:transparent;border:none;cursor:pointer;color:var(--black);font-size:20px;font-weight:bold;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);}
.cal-dh{background:var(--surface);padding:8px 2px;text-align:center;font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;}
.cal-day{background:var(--surface);padding:8px 2px;text-align:center;font-size:13px;cursor:pointer;min-height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all 0.15s;}
.cal-day:hover{background:rgba(255,215,0,0.1);color:var(--gold);}
.cal-day.today{color:var(--gold);font-weight:700;}
.cal-day.selected{background:rgba(255,215,0,0.2);color:var(--gold);}
.cal-day.has-data::after{content:'';width:6px;height:6px;background:var(--gold);border-radius:50%;display:block;}
.cal-day.empty{cursor:default;opacity:0.15;pointer-events:none;}
/* CHART */
.chart-wrap{display:flex;align-items:flex-end;gap:8px;height:130px;padding-top:10px;}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bars{display:flex;align-items:flex-end;gap:2px;height:100px;}
.bar{width:14px;border-radius:3px 3px 0 0;min-height:4px;}
.bar-p{background:var(--gold);}
.bar-a{background:var(--danger);opacity:0.7;}
.bar-lbl{font-size:10px;color:var(--text-dim);}
/* ALERTS */
.alert{padding:10px 16px;border-radius:8px;font-size:13px;margin-bottom:14px;}
.alert-error{background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);color:var(--danger);}
.btn-remove{background:transparent;border:1px solid var(--danger);color:var(--danger);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all 0.2s;font-family:'Exo 2',sans-serif;}
.btn-remove:hover{background:var(--danger);color:white;}
/* UTILS */
.flex{display:flex;}.gap2{gap:8px;}.gap3{gap:12px;}.aic{align-items:center;}.jb{justify-content:space-between;}.mb2{margin-bottom:8px;}.mb3{margin-bottom:14px;}.mb4{margin-bottom:20px;}.mt2{margin-top:8px;}.dim{color:var(--text-dim);font-size:13px;}.gold{color:var(--gold);}.bold{font-weight:700;}.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
.empty{text-align:center;padding:36px 20px;color:var(--text-dim);}
.empty-icon{font-size:38px;margin-bottom:10px;}
.badge{background:var(--gold);color:var(--black);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;margin-left:auto;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn 0.3s ease;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--surface2);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:var(--gold);}
/* MOBILE */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--darker);border-top:2px solid var(--gold);z-index:200;height:60px;}
@media(max-width:768px){
  .auth-box{width:95vw;padding:24px 16px;}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .content{padding:16px;padding-bottom:70px;}
  .header{padding:0 12px;height:56px;}
  .mobile-nav{display:flex;}
  .mnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--text-dim);font-size:9px;font-weight:600;text-transform:uppercase;border:none;background:transparent;font-family:'Exo 2',sans-serif;padding:4px 2px;}
  .mnav-item.active{color:var(--gold);}
  .mnav-icon{font-size:20px;}
}
@media(min-width:769px){.mobile-nav{display:none!important;}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="s-auth" class="screen active">
  <div class="auth-box">
    <div class="auth-title">DIÁRIO DE BORDO</div>
    <div class="auth-subtitle">I.A Studio · Sistema de Relatórios</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchTab('register')">Colaborador</button>
      <button class="auth-tab" onclick="switchTab('manager')">Gestor</button>
    </div>
    <div id="auth-err" class="alert alert-error" style="display:none"></div>
    <!-- LOGIN -->
    <div id="tab-login">
      <div class="form-group"><label class="form-label">Login</label><input class="inp" id="l-login" placeholder="Seu login"></div>
      <div class="form-group"><label class="form-label">Senha</label><input class="inp" id="l-pass" type="password" placeholder="Sua senha"></div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Entrar</button>
    </div>
    <!-- REGISTER -->
    <div id="tab-register" style="display:none">
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Nome Completo</label><input class="inp" id="r-name" placeholder="Nome"></div>
        <div class="form-group"><label class="form-label">Cargo</label><input class="inp" id="r-role" placeholder="Cargo"></div>
      </div>
      <div class="form-group"><label class="form-label">Departamento</label><input class="inp" id="r-dept" placeholder="Departamento"></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Login</label><input class="inp" id="r-login" placeholder="Login único"></div>
        <div class="form-group"><label class="form-label">Senha</label><input class="inp" id="r-pass" type="password" placeholder="Senha"></div>
      </div>
      
      <button class="btn btn-primary" style="width:100%" onclick="doRegister()">Cadastrar</button>
    </div>
    <!-- MANAGER -->
    <div id="tab-manager" style="display:none">
      <div class="form-group"><label class="form-label">Código de Gestor *</label><input class="inp" id="m-code" type="password" placeholder="Código de acesso"></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Nome Completo</label><input class="inp" id="m-name" placeholder="Nome"></div>
        <div class="form-group"><label class="form-label">Cargo</label><input class="inp" id="m-role" placeholder="Cargo"></div>
      </div>
      <div class="form-group"><label class="form-label">Departamento</label><input class="inp" id="m-dept" placeholder="Departamento"></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Login</label><input class="inp" id="m-login" placeholder="Login único"></div>
        <div class="form-group"><label class="form-label">Senha</label><input class="inp" id="m-pass" type="password" placeholder="Senha"></div>
      </div>
      
      <button class="btn btn-primary" style="width:100%" onclick="doManagerRegister()">Cadastrar como Gestor</button>
    </div>
  </div>
</div>

<!-- COLLABORATOR -->
<div id="s-collab" class="screen">
  <div class="header">
    <div><div class="logo-text">Diário de Bordo</div><div class="logo-sub">I.A Studio</div></div>
    <div class="header-user">
      <div class="user-badge" id="collab-badge">👤 —</div>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="main-layout">
    <div class="sidebar" id="collab-sidebar">
      <div class="nav-item active" onclick="collabNav('dashboard',this)"><span>📊</span> Dashboard</div>
      <div class="nav-item" onclick="collabNav('activities',this)"><span>📝</span> Atividades</div>
      <div class="nav-item" onclick="collabNav('calendar',this)"><span>📅</span> Calendário</div>
      <div class="nav-item" onclick="collabNav('tasks',this)"><span>✅</span> Tarefas</div>
      <div class="nav-item" onclick="collabNav('messages',this)"><span>💬</span> Mensagens</div>
      <div class="nav-item" onclick="collabNav('profile',this)"><span>👤</span> Meu Perfil</div>
    </div>
    <div class="content fade-in" id="collab-content"></div>
  </div>
  <nav class="mobile-nav">
    <button class="mnav-item active" onclick="collabNav('dashboard',this)"><span class="mnav-icon">📊</span>Início</button>
    <button class="mnav-item" onclick="collabNav('activities',this)"><span class="mnav-icon">📝</span>Atividades</button>
    <button class="mnav-item" onclick="collabNav('calendar',this)"><span class="mnav-icon">📅</span>Calendário</button>
    <button class="mnav-item" onclick="collabNav('tasks',this)"><span class="mnav-icon">✅</span>Tarefas</button>
    <button class="mnav-item" onclick="collabNav('messages',this)"><span class="mnav-icon">💬</span>Mensagens</button>
  </nav>
</div>

<!-- MANAGER -->
<div id="s-mgr" class="screen">
  <div class="header">
    <div><div class="logo-text">Diário de Bordo</div><div class="logo-sub">I.A Studio · Gestão</div></div>
    <div class="header-user">
      <div class="user-badge" id="mgr-badge">⭐ —</div>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="main-layout">
    <div class="sidebar" id="mgr-sidebar">
      <div class="nav-item active" onclick="mgrNav('dashboard',this)"><span>📊</span> Dashboard</div>
      <div class="nav-item" onclick="mgrNav('my-act',this)"><span>📝</span> Minhas Atividades</div>
      <div class="nav-item" onclick="mgrNav('reports',this)"><span>📋</span> Relatórios</div>
      <div class="nav-item" onclick="mgrNav('team',this)"><span>👥</span> Colaboradores</div>
      <div class="nav-item" onclick="mgrNav('tasks',this)"><span>✅</span> Enviar Tarefas</div>
      <div class="nav-item" onclick="mgrNav('messages',this)"><span>💬</span> Mensagens</div>
    </div>
    <div class="content fade-in" id="mgr-content"></div>
  </div>
  <nav class="mobile-nav">
    <button class="mnav-item active" onclick="mgrNav('dashboard',this)"><span class="mnav-icon">📊</span>Painel</button>
    <button class="mnav-item" onclick="mgrNav('reports',this)"><span class="mnav-icon">📋</span>Relatórios</button>
    <button class="mnav-item" onclick="mgrNav('tasks',this)"><span class="mnav-icon">✅</span>Tarefas</button>
    <button class="mnav-item" onclick="mgrNav('messages',this)"><span class="mnav-icon">💬</span>Mensagens</button>
    <button class="mnav-item" onclick="mgrNav('team',this)"><span class="mnav-icon">👥</span>Equipe</button>
  </nav>
</div>

<script>
// ===== DATA =====
var MGCODE = "12345";
var users, managers, activities, mgrActs, messages, tasks;

function initData() {
  users = JSON.parse(localStorage.getItem('db_users') || 'null') || [
    {id:1,name:"Carlos Silva",role:"Desenvolvedor",department:"TI",login:"carlos",password:"123",type:"collaborator"},
    {id:2,name:"Ana Costa",role:"Designer",department:"Criação",login:"ana",password:"123",type:"collaborator"}
  ];
  managers = JSON.parse(localStorage.getItem('db_managers') || 'null') || [
    {id:1,name:"Roberto Lima",role:"Gestor Geral",department:"Gestão",login:"gestor",password:"admin",type:"manager"}
  ];
  activities = JSON.parse(localStorage.getItem('db_activities') || 'null') || {
    1:{"2025-03-01":["Reunião de planejamento","Revisão de código"],"2025-03-02":["Desenvolvimento de feature"],"2025-03-04":["Correção de bugs"]},
    2:{"2025-03-01":["Criação de mockups"],"2025-03-02":["Design de interfaces"]}
  };
  mgrActs = JSON.parse(localStorage.getItem('db_mgracts') || '{}');
  messages = JSON.parse(localStorage.getItem('db_messages') || 'null') || [
    {id:1,from:"gestor",fromName:"Roberto Lima",to:"all",toName:"Todos",text:"Bom dia time! Reunião às 10h.",date:"2025-03-04"},
    {id:2,from:"gestor",fromName:"Roberto Lima",to:"carlos",toName:"Carlos Silva",text:"Carlos, pode verificar o deploy?",date:"2025-03-04"}
  ];
  tasks = JSON.parse(localStorage.getItem('db_tasks') || 'null') || [
    {id:1,from:"gestor",fromName:"Roberto Lima",to:"carlos",toName:"Carlos Silva",text:"Finalizar módulo de relatórios.",date:"2025-03-04",status:"pending"},
    {id:2,from:"gestor",fromName:"Roberto Lima",to:"all",toName:"Todos",text:"Atualizar documentação.",date:"2025-03-03",status:"pending"}
  ];
}

function save() {
  try {
    localStorage.setItem('db_users', JSON.stringify(users));
    localStorage.setItem('db_managers', JSON.stringify(managers));
    localStorage.setItem('db_activities', JSON.stringify(activities));
    localStorage.setItem('db_mgracts', JSON.stringify(mgrActs));
    localStorage.setItem('db_messages', JSON.stringify(messages));
    localStorage.setItem('db_tasks', JSON.stringify(tasks));
  } catch(e) {}
}

var cu = null; // current user
var cCollabPage = 'dashboard';
var cMgrPage = 'dashboard';
var collabSelDay = today();
var collabCalDate = new Date();
var mgrSelDay = today();
var mgrCalDate = new Date();
var rFilterUser = 'all';
var rFilterStart = '2025-03-01';
var rFilterEnd = today();

// ===== UTILS =====
function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) { try { return new Date(d+'T00:00:00').toLocaleDateString('pt-BR'); } catch(e) { return d; } }
function esc(s) { if(!s) return ''; var d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }
var MONTHS=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
var WDAYS=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

// ===== AUTH =====
function switchTab(tab) {
  ['login','register','manager'].forEach(function(t,i){
    document.getElementById('tab-'+t).style.display = t===tab?'block':'none';
    document.querySelectorAll('.auth-tab')[i].classList.toggle('active', t===tab);
  });
  document.getElementById('auth-err').style.display='none';
}

function showErr(msg) { var e=document.getElementById('auth-err'); e.textContent=msg; e.style.display='block'; }

function doLogin() {
  var login=document.getElementById('l-login').value.trim();
  var pass=document.getElementById('l-pass').value;
  var all=users.concat(managers);
  var found=null;
  for(var i=0;i<all.length;i++){ if(all[i].login===login && all[i].password===pass){ found=all[i]; break; } }
  if(!found){ showErr('Login ou senha incorretos.'); return; }
  cu=found;
  if(!activities[cu.id]) activities[cu.id]={};
  if(cu.type==='manager'){
    document.getElementById('mgr-badge').textContent='⭐ '+cu.name+' — '+cu.role;
    showScreen('s-mgr');
    mgrNav('dashboard', document.querySelector('#mgr-sidebar .nav-item'));
  } else {
    document.getElementById('collab-badge').textContent='👤 '+cu.name+' — '+cu.role;
    showScreen('s-collab');
    collabNav('dashboard', document.querySelector('#collab-sidebar .nav-item'));
  }
}

function doRegister() {
  var name=document.getElementById('r-name').value.trim();
  var role=document.getElementById('r-role').value.trim();
  var dept=document.getElementById('r-dept').value.trim();
  var login=document.getElementById('r-login').value.trim();
  var pass=document.getElementById('r-pass').value;
  
  if(!name||!role||!dept||!login||!pass){ showErr('Preencha todos os campos.'); return; }
  var all=users.concat(managers);
  for(var i=0;i<all.length;i++){ if(all[i].login===login){ showErr('Login já em uso.'); return; } }
  var u={id:Date.now(),name:name,role:role,department:dept,login:login,password:pass,type:'collaborator'};
  users.push(u); activities[u.id]={}; save();
  alert('Cadastro realizado! Faça login.');
  switchTab('login');
  document.getElementById('l-login').value=login;
}

function doManagerRegister() {
  var code=document.getElementById('m-code').value;
  if(code!==MGCODE){ showErr('Código de gestor inválido.'); return; }
  var name=document.getElementById('m-name').value.trim();
  var role=document.getElementById('m-role').value.trim();
  var dept=document.getElementById('m-dept').value.trim();
  var login=document.getElementById('m-login').value.trim();
  var pass=document.getElementById('m-pass').value;
  
  if(!name||!role||!dept||!login||!pass){ showErr('Preencha todos os campos.'); return; }
  var all=users.concat(managers);
  for(var i=0;i<all.length;i++){ if(all[i].login===login){ showErr('Login já em uso.'); return; } }
  managers.push({id:Date.now(),name:name,role:role,department:dept,login:login,password:pass,type:'manager'}); save();
  alert('Gestor cadastrado! Faça login.');
  switchTab('login');
}

function doLogout() { cu=null; showScreen('s-auth'); document.getElementById('l-pass').value=''; }

// ===== RENDER HELPERS =====
function statCard(n,l){ return '<div class="stat-card"><div class="stat-number">'+n+'</div><div class="stat-label">'+l+'</div></div>'; }
function emptyState(icon,txt){ return '<div class="empty"><div class="empty-icon">'+icon+'</div><p>'+txt+'</p></div>'; }

function renderActList(list, day, isMgr) {
  if(!list||list.length===0) return emptyState('📭','Nenhuma atividade registrada.');
  var fn = isMgr ? 'removeMgrAct' : 'removeCollabAct';
  var html='';
  for(var i=0;i<list.length;i++){
    html+='<div class="act-item"><div class="act-dot"></div><div class="act-text">'+esc(list[i])+'</div><button class="btn-x" onclick="'+fn+'(\''+day+'\','+i+')">✕</button></div>';
  }
  return html;
}

function renderMsgs(list, myLogin) {
  if(!list||list.length===0) return emptyState('💬','Nenhuma mensagem.');
  var html='';
  for(var i=0;i<list.length;i++){
    var m=list[i]; var mine=m.from===myLogin;
    html+='<div class="msg-bubble '+(mine?'msg-sent':'msg-recv')+'">';
    html+='<div class="msg-meta">'+(mine?'Você':esc(m.fromName))+' → '+esc(m.toName)+' · '+fmtDate(m.date)+'</div>';
    html+='<div>'+esc(m.text)+'</div></div>';
  }
  return html;
}

function renderCal(viewDate, acts, selDay, navFn, selFn) {
  var year=viewDate.getFullYear(), month=viewDate.getMonth();
  var firstDay=new Date(year,month,1).getDay();
  var daysInMonth=new Date(year,month+1,0).getDate();
  var todayS=today();
  var cells='';
  for(var i=0;i<firstDay;i++) cells+='<div class="cal-day empty"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var ds=year+'-'+(month+1<10?'0':'')+(month+1)+'-'+(d<10?'0':'')+d;
    var hasData=acts&&acts[ds]&&acts[ds].length>0;
    var cls='cal-day'+(ds===todayS?' today':'')+(ds===selDay?' selected':'')+(hasData?' has-data':'');
    cells+='<div class="'+cls+'" onclick="'+selFn+'(\''+ds+'\')">'+d+'</div>';
  }
  return '<div class="calendar"><div class="cal-hdr"><button class="cal-nav" onclick="'+navFn+'(-1)">‹</button><span>'+MONTHS[month]+' '+year+'</span><button class="cal-nav" onclick="'+navFn+'(1)">›</button></div><div class="cal-grid">'+WDAYS.map(function(w){return '<div class="cal-dh">'+w+'</div>';}).join('')+cells+'</div></div>';
}

// ===== COLLAB NAV =====
function collabNav(page, el) {
  cCollabPage=page;
  document.querySelectorAll('#s-collab .nav-item, #s-collab .mnav-item').forEach(function(n){ n.classList.remove('active'); });
  if(el) el.classList.add('active');
  renderCollab(page);
}

function renderCollab(page) {
  var acts = activities[cu.id]||{};
  var todayActs = acts[today()]||[];
  var myTasks = tasks.filter(function(t){ return t.to==='all'||t.to===cu.login; });
  var myMsgs = messages.filter(function(m){ return m.to==='all'||m.to===cu.login||m.from===cu.login; });
  var html='';

  if(page==='dashboard') {
    var totalDays=Object.keys(acts).length;
    var totalActs=Object.values(acts).reduce(function(a,b){return a+b.length;},0);
    html='<div class="page-title">Dashboard</div><div class="page-subtitle">Bem-vindo, '+esc(cu.name)+'!</div>';
    html+='<div class="grid-4">'+statCard(totalDays,'Dias Registrados')+statCard(totalActs,'Total Atividades')+statCard(todayActs.length,'Atividades Hoje')+statCard(myTasks.length,'Tarefas Recebidas')+'</div>';
    html+='<div class="grid-2">';
    html+='<div class="card card-gold"><div class="card-title">📝 Atividades de Hoje</div>'+(todayActs.length===0?emptyState('📋','Nenhuma atividade hoje.'):todayActs.map(function(a){return '<div class="act-item"><div class="act-dot"></div><div class="act-text">'+esc(a)+'</div></div>';}).join(''))+'</div>';
    html+='<div class="card card-gold"><div class="card-title">📋 Tarefas do Gestor</div>'+(myTasks.length===0?emptyState('✅','Nenhuma tarefa.'):myTasks.slice(0,4).map(function(t){return '<div class="act-item"><div class="act-dot"></div><div><div>'+esc(t.text)+'</div><div class="dim">De: '+esc(t.fromName)+' · '+fmtDate(t.date)+'</div></div></div>';}).join(''))+'</div>';
    html+='</div>';
  }
  else if(page==='activities') {
    html='<div class="page-title">Minhas Atividades</div><div class="page-subtitle">Hoje: '+fmtDate(today())+'</div>';
    html+='<div class="card card-gold"><div class="card-title">➕ Adicionar Atividade</div>';
    html+='<div class="flex gap2 mb3"><input class="inp" id="new-act" placeholder="Descreva sua atividade..." style="flex:1" onkeydown="if(event.key===\'Enter\')addCollabAct()"><button class="btn btn-primary" onclick="addCollabAct()">Adicionar</button></div>';
    html+='<div id="act-list">'+renderActList(todayActs, today(), false)+'</div></div>';
  }
  else if(page==='calendar') {
    html='<div class="page-title">Calendário</div><div class="page-subtitle">Clique em um dia para ver as atividades.</div>';
    html+='<div class="grid-2">'+renderCal(collabCalDate, acts, collabSelDay, 'collabCalNav','collabSelDay');
    html+='<div class="card card-gold"><div class="card-title">📅 '+fmtDate(collabSelDay)+'</div><div id="cal-acts">'+renderActList(acts[collabSelDay]||[], collabSelDay, false)+'</div></div></div>';
  }
  else if(page==='tasks') {
    html='<div class="page-title">Tarefas Recebidas</div><div class="page-subtitle">Tarefas atribuídas pelo gestor.</div>';
    if(myTasks.length===0) html+='<div class="card">'+emptyState('✅','Nenhuma tarefa atribuída.')+'</div>';
    else myTasks.forEach(function(t){ html+='<div class="card card-gold"><div class="flex aic jb mb2"><span class="bold">'+esc(t.text)+'</span><span class="tag tag-gold">Pendente</span></div><div class="dim">De: '+esc(t.fromName)+' · '+fmtDate(t.date)+'</div></div>'; });
  }
  else if(page==='messages') {
    html='<div class="page-title">Mensagens</div><div class="page-subtitle">Comunicação com o gestor.</div>';
    html+='<div class="card mb3"><div class="msg-list" id="msg-list">'+renderMsgs(myMsgs, cu.login)+'</div></div>';
    html+='<div class="flex gap2"><input class="inp" id="new-msg" placeholder="Enviar mensagem ao gestor..." style="flex:1" onkeydown="if(event.key===\'Enter\')sendCollabMsg()"><button class="btn btn-primary" onclick="sendCollabMsg()">Enviar</button></div>';
  }

  else if(page==='profile') {
    var totalDays=Object.keys(acts).length;
    var totalActs=Object.values(acts).reduce(function(a,b){return a+b.length;},0);
    html='<div class="page-title">Meu Perfil</div><div class="page-subtitle">Seus dados e estatísticas pessoais.</div>';
    html+='<div class="grid-2">';
    html+='<div class="card card-gold">';
    html+='<div class="card-title">👤 Dados Pessoais</div>';
    html+='<div class="act-item mb2"><div class="act-dot"></div><div><div class="dim" style="font-size:11px">NOME</div><div class="bold">'+esc(cu.name)+'</div></div></div>';
    html+='<div class="act-item mb2"><div class="act-dot"></div><div><div class="dim" style="font-size:11px">CARGO</div><div class="bold">'+esc(cu.role)+'</div></div></div>';
    html+='<div class="act-item mb2"><div class="act-dot"></div><div><div class="dim" style="font-size:11px">DEPARTAMENTO</div><div class="bold">'+esc(cu.department)+'</div></div></div>';
    html+='<div class="act-item"><div class="act-dot"></div><div><div class="dim" style="font-size:11px">LOGIN</div><div class="bold">'+esc(cu.login)+'</div></div></div>';
    html+='</div>';
    html+='<div class="card card-gold">';
    html+='<div class="card-title">📊 Minhas Estatísticas</div>';
    html+='<div class="grid-2">'+statCard(totalDays,'Dias Registrados')+statCard(totalActs,'Total de Atividades')+'</div>';
    html+='<hr class="divider">';
    html+='<div class="card-title mt2">📅 Últimos Registros</div>';
    var recentDays=Object.entries(acts).sort(function(a,b){return b[0].localeCompare(a[0]);}).slice(0,5);
    if(recentDays.length===0) html+=emptyState('📋','Nenhuma atividade ainda.');
    else recentDays.forEach(function(e){ html+='<div class="mb2"><div class="bold gold" style="font-size:12px">'+fmtDate(e[0])+'</div><div class="dim" style="font-size:12px">'+e[1].length+' atividade(s)</div></div>'; });
    html+='</div>';
    html+='</div>';
  }
  if(page==='messages'){ var ml=document.getElementById('msg-list'); if(ml) ml.scrollTop=ml.scrollHeight; }
}

function addCollabAct() {
  var inp=document.getElementById('new-act'); if(!inp) return;
  var val=inp.value.trim(); if(!val) return;
  var d=today();
  if(!activities[cu.id]) activities[cu.id]={};
  if(!activities[cu.id][d]) activities[cu.id][d]=[];
  activities[cu.id][d].push(val); inp.value=''; save();
  document.getElementById('act-list').innerHTML=renderActList(activities[cu.id][d], d, false);
}

function removeCollabAct(day, idx) {
  if(activities[cu.id]&&activities[cu.id][day]) activities[cu.id][day].splice(idx,1); save();
  if(cCollabPage==='activities') document.getElementById('act-list').innerHTML=renderActList(activities[cu.id][today()]||[], today(), false);
  else if(cCollabPage==='calendar') document.getElementById('cal-acts').innerHTML=renderActList(activities[cu.id][day]||[], day, false);
}

function collabCalNav(dir) { collabCalDate=new Date(collabCalDate.getFullYear(),collabCalDate.getMonth()+dir,1); renderCollab('calendar'); }
function collabSelDay(d) { collabSelDay=d; renderCollab('calendar'); }

function sendCollabMsg() {
  var inp=document.getElementById('new-msg'); if(!inp) return;
  var text=inp.value.trim(); if(!text) return;
  messages.push({id:Date.now(),from:cu.login,fromName:cu.name,to:'gestor',toName:'Gestor',text:text,date:today()}); inp.value=''; save();
  var myMsgs=messages.filter(function(m){ return m.to==='all'||m.to===cu.login||m.from===cu.login; });
  var ml=document.getElementById('msg-list');
  if(ml){ ml.innerHTML=renderMsgs(myMsgs,cu.login); ml.scrollTop=ml.scrollHeight; }
}

// ===== MGR NAV =====
function mgrNav(page, el) {
  cMgrPage=page;
  document.querySelectorAll('#s-mgr .nav-item, #s-mgr .mnav-item').forEach(function(n){ n.classList.remove('active'); });
  if(el) el.classList.add('active');
  renderMgr(page);
}

function renderMgr(page) {
  var html='';
  var todayActs=mgrActs[today()]||[];

  if(page==='dashboard') {
    var dates=[]; for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);dates.push(d.toISOString().split('T')[0]);}
    var bars=dates.map(function(date){
      var p=users.filter(function(u){return activities[u.id]&&activities[u.id][date]&&activities[u.id][date].length>0;}).length;
      var a=users.length-p;
      var ph=users.length?Math.max((p/users.length)*90,4):4;
      var ah=users.length?Math.max((a/users.length)*90,4):4;
      return '<div class="bar-group"><div class="bars"><div class="bar bar-p" style="height:'+ph+'px"></div><div class="bar bar-a" style="height:'+ah+'px"></div></div><div class="bar-lbl">'+date.slice(8)+'/'+date.slice(5,7)+'</div></div>';
    }).join('');
    var totalDaysAll=Object.values(activities).reduce(function(a,u){return a+Object.keys(u).length;},0);
    html='<div class="page-title">Painel do Gestor</div><div class="page-subtitle">Visão geral da equipe.</div>';
    html+='<div class="grid-4">'+statCard(users.length,'Colaboradores')+statCard(tasks.length,'Tarefas')+statCard(messages.length,'Mensagens')+statCard(totalDaysAll,'Dias Registrados')+'</div>';
    html+='<div class="card card-gold mb4"><div class="card-title">📈 Atividade (últimos 7 dias)</div><div class="chart-wrap">'+bars+'</div>';
    html+='<div class="flex gap3 mt2"><span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)"><span style="width:12px;height:12px;background:var(--gold);border-radius:2px;display:inline-block"></span>Com registro</span><span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)"><span style="width:12px;height:12px;background:var(--danger);opacity:.7;border-radius:2px;display:inline-block"></span>Sem registro</span></div></div>';
    html+='<div class="card card-gold"><div class="card-title">👥 Time</div><table class="tbl"><thead><tr><th>Nome</th><th>Cargo</th><th>Departamento</th><th>Dias</th></tr></thead><tbody>';
    users.forEach(function(u){ html+='<tr><td class="bold">'+esc(u.name)+'</td><td>'+esc(u.role)+'</td><td>'+esc(u.department)+'</td><td><span class="tag tag-gold">'+Object.keys(activities[u.id]||{}).length+'</span></td></tr>'; });
    html+='</tbody></table></div>';
  }
  else if(page==='my-act') {
    html='<div class="page-title">Minhas Atividades</div><div class="page-subtitle">Hoje: '+fmtDate(today())+'</div>';
    html+='<div class="grid-2"><div class="card card-gold"><div class="card-title">➕ Adicionar</div>';
    html+='<div class="flex gap2 mb3"><input class="inp" id="mgr-new-act" placeholder="Descreva a atividade..." style="flex:1" onkeydown="if(event.key===\'Enter\')addMgrAct()"><button class="btn btn-primary" onclick="addMgrAct()">Add</button></div>';
    html+='<div id="mgr-act-list">'+renderActList(todayActs, today(), true)+'</div></div>';
    html+=renderCal(mgrCalDate, mgrActs, mgrSelDay, 'mgrCalNav','mgrSelDay')+'</div>';
  }
  else if(page==='reports') {
    var fOpts='<option value="all">— Todos os Colaboradores —</option>'+users.map(function(u){return '<option value="'+u.login+'"'+(rFilterUser===u.login?' selected':'')+'>'+esc(u.name)+' ('+esc(u.role)+')</option>';}).join('');
    var fUsers=rFilterUser==='all'?users:users.filter(function(u){return u.login===rFilterUser;});
    html='<div class="page-title">📋 Histórico de Atividades</div><div class="page-subtitle">Pesquise e visualize o histórico completo de cada colaborador.</div>';
    // Filter card
    html+='<div class="card card-gold mb3">';
    html+='<div class="card-title">🔍 Buscar Histórico</div>';
    html+='<div class="grid-3">';
    html+='<div class="form-group"><label class="form-label">👤 Colaborador</label><select class="inp" onchange="rFilterUser=this.value;renderMgr(\'reports\')">'+fOpts+'</select></div>';
    html+='<div class="form-group"><label class="form-label">📅 Data Início</label><input class="inp" type="date" value="'+rFilterStart+'" onchange="rFilterStart=this.value;renderMgr(\'reports\')"></div>';
    html+='<div class="form-group"><label class="form-label">📅 Data Fim</label><input class="inp" type="date" value="'+rFilterEnd+'" onchange="rFilterEnd=this.value;renderMgr(\'reports\')"></div>';
    html+='</div>';
    // Quick date filters
    html+='<div class="flex gap2" style="flex-wrap:wrap">';
    html+='<button class="btn btn-outline" style="font-size:12px;padding:6px 14px" onclick="setDateRange(7)">Últimos 7 dias</button>';
    html+='<button class="btn btn-outline" style="font-size:12px;padding:6px 14px" onclick="setDateRange(15)">Últimos 15 dias</button>';
    html+='<button class="btn btn-outline" style="font-size:12px;padding:6px 14px" onclick="setDateRange(30)">Últimos 30 dias</button>';
    html+='<button class="btn btn-outline" style="font-size:12px;padding:6px 14px" onclick="setDateRange(0)">Este mês</button>';
    html+='</div>';
    html+='</div>';
    // Results
    var totalFound=0;
    fUsers.forEach(function(u){
      var acts=activities[u.id]||{};
      var filtered=Object.entries(acts).filter(function(e){return e[0]>=rFilterStart&&e[0]<=rFilterEnd;}).sort(function(a,b){return b[0].localeCompare(a[0]);});
      var totalActs=filtered.reduce(function(s,e){return s+e[1].length;},0);
      totalFound+=totalActs;
      html+='<div class="card card-gold mb3">';
      html+='<div class="flex aic jb mb3">';
      html+='<div><div class="card-title" style="margin-bottom:2px">👤 '+esc(u.name)+'</div><div class="dim">'+esc(u.role)+' · <span class="tag tag-gold">'+esc(u.department)+'</span></div></div>';
      html+='<div style="text-align:right"><div class="stat-number" style="font-size:28px">'+totalActs+'</div><div class="dim" style="font-size:11px">atividades</div></div>';
      html+='</div>';
      if(filtered.length===0){
        html+=emptyState('📭','Nenhuma atividade no período selecionado.');
      } else {
        filtered.forEach(function(e){
          html+='<div style="margin-bottom:14px">';
          html+='<div class="bold gold" style="font-size:13px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">📅 '+fmtDate(e[0])+'</div>';
          html+=e[1].map(function(a){return '<div class="act-item"><div class="act-dot"></div><div class="act-text">'+esc(a)+'</div></div>';}).join('');
          html+='</div>';
        });
      }
      html+='</div>';
    });
    if(fUsers.length===0) html+='<div class="card">'+emptyState('📭','Nenhum colaborador encontrado.')+'</div>';
  }
  else if(page==='team') {
    html='<div class="page-title">Colaboradores</div><div class="page-subtitle">Clique na lixeira 🗑 para remover um colaborador da equipe.</div>';
    html+='<div class="card">';
    if(users.length===0){
      html+=emptyState('👥','Nenhum colaborador cadastrado.');
    } else {
      users.forEach(function(u){
        html+='<div class="act-item" style="margin-bottom:10px;padding:16px;">';
        html+='<div style="flex:1">';
        html+='<div class="bold" style="font-size:15px;margin-bottom:4px">'+esc(u.name)+'</div>';
        html+='<div class="dim">'+esc(u.role)+' · <span class="tag tag-gold">'+esc(u.department)+'</span></div>';
        html+='</div>';
        html+='<button onclick="removeCollab('+u.id+',\''+esc(u.name)+'\')" style="background:transparent;border:1px solid var(--danger);color:var(--danger);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:18px;transition:all 0.2s;font-weight:bold;" onmouseover="this.style.background=\'var(--danger)\';this.style.color=\'white\'" onmouseout="this.style.background=\'transparent\';this.style.color=\'var(--danger)\'">🗑️</button>';
        html+='</div>';
      });
    }
    html+='</div>';
  }
  else if(page==='tasks') {
    var tOpts='<option value="all">Todos</option>'+users.map(function(u){return '<option value="'+u.login+'">'+esc(u.name)+'</option>';}).join('');
    html='<div class="page-title">Enviar Tarefas</div><div class="page-subtitle">Atribua tarefas ao time.</div>';
    html+='<div class="card card-gold mb3"><div class="card-title">📋 Nova Tarefa</div>';
    html+='<div class="form-group"><label class="form-label">Para</label><select class="inp" id="task-to">'+tOpts+'</select></div>';
    html+='<div class="form-group"><label class="form-label">Descrição</label><textarea class="inp" id="task-text" placeholder="Descreva a tarefa..."></textarea></div>';
    html+='<button class="btn btn-primary" onclick="sendTask()">Enviar Tarefa</button></div>';
    html+='<div class="card"><div class="card-title">📜 Histórico</div>';
    if(tasks.length===0) html+=emptyState('✅','Nenhuma tarefa enviada.');
    else { html+='<table class="tbl"><thead><tr><th>Tarefa</th><th>Para</th><th>Data</th></tr></thead><tbody>'; tasks.slice().reverse().forEach(function(t){ html+='<tr><td>'+esc(t.text)+'</td><td>'+esc(t.toName)+'</td><td>'+fmtDate(t.date)+'</td></tr>'; }); html+='</tbody></table>'; }
    html+='</div>';
  }
  else if(page==='messages') {
    var mOpts='<option value="all">Todos</option>'+users.map(function(u){return '<option value="'+u.login+'">'+esc(u.name)+'</option>';}).join('');
    html='<div class="page-title">Mensagens</div><div class="page-subtitle">Comunique-se com o time.</div>';
    html+='<div class="card card-gold mb3"><div class="card-title">✉️ Nova Mensagem</div>';
    html+='<div class="form-group"><label class="form-label">Para</label><select class="inp" id="mgr-msg-to">'+mOpts+'</select></div>';
    html+='<div class="form-group"><label class="form-label">Mensagem</label><textarea class="inp" id="mgr-msg-text" placeholder="Escreva sua mensagem..." style="min-height:70px"></textarea></div>';
    html+='<button class="btn btn-primary" onclick="sendMgrMsg()">Enviar</button></div>';
    html+='<div class="card"><div class="card-title">📬 Histórico</div><div class="msg-list" id="mgr-msg-list">'+renderMsgs(messages.slice().reverse(), cu.login)+'</div></div>';
  }

  document.getElementById('mgr-content').innerHTML=html;
  var ml=document.getElementById('mgr-msg-list'); if(ml) ml.scrollTop=ml.scrollHeight;
}

function addMgrAct() {
  var inp=document.getElementById('mgr-new-act'); if(!inp) return;
  var val=inp.value.trim(); if(!val) return;
  var d=today();
  if(!mgrActs[d]) mgrActs[d]=[];
  mgrActs[d].push(val); inp.value=''; save();
  document.getElementById('mgr-act-list').innerHTML=renderActList(mgrActs[d], d, true);
}

function removeMgrAct(day, idx) {
  if(mgrActs[day]) mgrActs[day].splice(idx,1); save();
  document.getElementById('mgr-act-list').innerHTML=renderActList(mgrActs[today()]||[], today(), true);
}

function mgrCalNav(dir) { mgrCalDate=new Date(mgrCalDate.getFullYear(),mgrCalDate.getMonth()+dir,1); renderMgr('my-act'); }
function mgrSelDay(d) { mgrSelDay=d; renderMgr('my-act'); }

function sendTask() {
  var to=document.getElementById('task-to').value;
  var text=document.getElementById('task-text').value.trim(); if(!text) return;
  var toUser=users.find(function(u){return u.login===to;});
  tasks.push({id:Date.now(),from:cu.login,fromName:cu.name,to:to,toName:to==='all'?'Todos':(toUser?toUser.name:to),text:text,date:today(),status:'pending'}); save();
  renderMgr('tasks');
}

function sendMgrMsg() {
  var to=document.getElementById('mgr-msg-to').value;
  var text=document.getElementById('mgr-msg-text').value.trim(); if(!text) return;
  var toUser=users.find(function(u){return u.login===to;});
  messages.push({id:Date.now(),from:cu.login,fromName:cu.name,to:to,toName:to==='all'?'Todos':(toUser?toUser.name:to),text:text,date:today()}); save();
  renderMgr('messages');
}

function setDateRange(days) {
  var end=new Date(); var start=new Date();
  if(days===0){ start=new Date(end.getFullYear(),end.getMonth(),1); }
  else { start.setDate(start.getDate()-days); }
  rFilterStart=start.toISOString().split('T')[0];
  rFilterEnd=end.toISOString().split('T')[0];
  renderMgr('reports');
}

function removeCollab(id, name) {
  if(!confirm('Tem certeza que deseja remover "'+name+'" da equipe?\n\nEsta ação não pode ser desfeita.')) return;
  users = users.filter(function(u){ return u.id !== id; });
  save();
  renderMgr('team');
}

// ===== INIT =====
initData();
showScreen('s-auth');

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){ navigator.serviceWorker.register('./sw.js').catch(function(){}); });
}
</script>
</body>
</html>
