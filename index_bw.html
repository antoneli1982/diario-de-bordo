<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diário de Bordo">
<meta name="theme-color" content="#FFFFFF">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Diário de Bordo — I.A Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFFFFF;
  --gold-dark: #CCCCCC;
  --gold-light: #EEEEEE;
  --black: #000000;
  --darker: #0D0D0D;
  --surface: #141414;
  --surface2: #1E1E1E;
  --border: #444444;
  --border-gold: rgba(255,255,255,0.2);
  --text: #F0F0F0;
  --text-dim: #777777;
  --danger: #FF4444;
  --success: #44FF88;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Exo 2',sans-serif; background:var(--black); color:var(--text); min-height:100vh; overflow-x:hidden; }

/* SCREENS */
.screen { display:none; min-height:100vh; }
.screen.active { display:flex; flex-direction:column; }

/* AUTH */
#auth-screen { align-items:center; justify-content:center; position:relative; overflow:hidden; }
#auth-screen::before { content:''; position:absolute; width:600px; height:600px; background:radial-gradient(circle,rgba(255,255,255,0.04) 0%,transparent 70%); top:50%; left:50%; transform:translate(-50%,-50%); }
.auth-box { background:var(--surface); border:1px solid var(--border-gold); border-radius:16px; padding:40px; width:440px; position:relative; z-index:1; box-shadow:0 24px 60px rgba(0,0,0,0.8),0 0 40px rgba(255,255,255,0.04); animation:fadeIn 0.4s ease; }
.auth-logo { text-align:center; margin-bottom:28px; }
.auth-title { font-family:'Rajdhani',sans-serif; font-size:28px; font-weight:700; color:var(--gold); letter-spacing:3px; text-transform:uppercase; }
.auth-subtitle { color:var(--text-dim); font-size:12px; margin-top:4px; letter-spacing:2px; text-transform:uppercase; }
.auth-tabs { display:flex; gap:6px; margin-bottom:22px; background:var(--surface2); border-radius:8px; padding:4px; }
.auth-tab { flex:1; padding:9px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; font-family:'Exo 2',sans-serif; transition:all 0.2s; background:transparent; color:var(--text-dim); }
.auth-tab.active { background:#FFFFFF; color:#000000; }

/* HEADER */
.header { background:var(--darker); border-bottom:2px solid var(--gold); padding:0 24px; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 4px 20px rgba(255,255,255,0.07); flex-shrink:0; }
.logo-text { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--gold); letter-spacing:2px; text-transform:uppercase; }
.logo-sub { font-size:10px; color:var(--text-dim); letter-spacing:3px; text-transform:uppercase; }
.header-user { display:flex; align-items:center; gap:12px; }
.user-badge { background:var(--surface); border:1px solid var(--border-gold); border-radius:8px; padding:6px 14px; font-size:13px; color:var(--gold); font-weight:600; }
.btn-logout { background:transparent; border:1px solid var(--danger); color:var(--danger); padding:6px 14px; border-radius:6px; cursor:pointer; font-size:13px; transition:all 0.2s; }
.btn-logout:hover { background:var(--danger); color:white; }

/* LAYOUT */
.main-layout { display:flex; flex:1; min-height:calc(100vh - 64px); }
.sidebar { width:220px; background:var(--darker); border-right:1px solid var(--border); padding:16px 0; flex-shrink:0; }
.nav-item { display:flex; align-items:center; gap:10px; padding:13px 20px; cursor:pointer; color:var(--text-dim); font-size:14px; font-weight:500; transition:all 0.2s; border-left:3px solid transparent; }
.nav-item:hover { background:rgba(255,255,255,0.04); color:var(--gold); border-left-color:var(--gold); }
.nav-item.active { background:rgba(255,255,255,0.07); color:var(--gold); border-left-color:var(--gold); }
.nav-icon { font-size:17px; }
.badge-count { background:#FFFFFF; color:#000000; border-radius:10px; padding:1px 7px; font-size:11px; font-weight:700; margin-left:auto; }
.content { flex:1; padding:28px; overflow-y:auto; background:var(--black); animation:fadeIn 0.3s ease; }

/* TYPOGRAPHY */
.page-title { font-family:'Rajdhani',sans-serif; font-size:28px; font-weight:700; color:var(--gold); letter-spacing:1px; margin-bottom:6px; text-transform:uppercase; }
.page-subtitle { color:var(--text-dim); font-size:13px; margin-bottom:24px; }

/* CARDS */
.card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; }
.card-gold { border-color:var(--border-gold); background:linear-gradient(135deg,var(--surface) 0%,rgba(255,255,255,0.02) 100%); }
.card-title { font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600; color:var(--gold); text-transform:uppercase; letter-spacing:1px; margin-bottom:14px; }

/* GRID */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:16px; }

/* STATS */
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; transition:all 0.2s; }
.stat-card:hover { border-color:var(--border-gold); transform:translateY(-2px); box-shadow:0 8px 24px rgba(255,255,255,0.05); }
.stat-number { font-family:'Rajdhani',sans-serif; font-size:36px; font-weight:700; color:var(--gold); }
.stat-label { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }

/* BUTTONS */
.btn { padding:10px 20px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; font-family:'Exo 2',sans-serif; transition:all 0.2s; border:none; letter-spacing:0.5px; }
.btn-primary { background:#FFFFFF; color:#000000; }
.btn-primary:hover { background:#DDDDDD; transform:translateY(-1px); box-shadow:0 4px 16px rgba(255,255,255,0.2); }
.btn-outline { background:transparent; border:1px solid var(--gold); color:var(--gold); }
.btn-outline:hover { background:rgba(255,255,255,0.07); }
.btn-sm { padding:6px 14px; font-size:12px; }
.btn-danger-sm { background:transparent; border:none; color:var(--text-dim); cursor:pointer; font-size:15px; padding:2px 6px; border-radius:4px; transition:all 0.2s; }
.btn-danger-sm:hover { color:var(--danger); background:rgba(255,68,68,0.1); }

/* INPUTS */
input.inp, textarea.inp, select.inp {
  width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text);
  padding:10px 14px; border-radius:8px; font-size:14px; font-family:'Exo 2',sans-serif; transition:border-color 0.2s; outline:none;
}
input.inp:focus, textarea.inp:focus, select.inp:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(255,255,255,0.07); }
textarea.inp { resize:vertical; min-height:90px; }
.form-group { margin-bottom:14px; }
.form-label { display:block; font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; font-weight:600; }

/* ACTIVITY ITEM */
.activity-item { display:flex; align-items:center; gap:12px; padding:11px 14px; background:var(--surface2); border-radius:8px; margin-bottom:8px; border:1px solid var(--border); transition:all 0.2s; }
.activity-item:hover { border-color:var(--border-gold); }
.activity-dot { width:8px; height:8px; background:#FFFFFF; border-radius:50%; flex-shrink:0; }
.activity-text { flex:1; font-size:14px; }

/* MESSAGES */
.msg-list { max-height:360px; overflow-y:auto; padding-right:4px; margin-bottom:16px; }
.msg-bubble { padding:12px 16px; border-radius:10px; margin-bottom:10px; max-width:80%; }
.msg-sent { background:rgba(255,255,255,0.08); border:1px solid rgba(255,215,0,0.25); margin-left:auto; }
.msg-received { background:var(--surface2); border:1px solid var(--border); }
.msg-meta { font-size:11px; color:var(--text-dim); margin-bottom:4px; }
.msg-text { font-size:14px; }

/* TAGS */
.tag { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.tag-gold { background:rgba(255,255,255,0.08); color:var(--gold); border:1px solid rgba(255,255,255,0.2); }
.tag-success { background:rgba(68,255,136,0.1); color:var(--success); border:1px solid rgba(68,255,136,0.3); }
.tag-danger { background:rgba(255,68,68,0.1); color:var(--danger); border:1px solid rgba(255,68,68,0.3); }

/* TABLE */
table.tbl { width:100%; border-collapse:collapse; }
table.tbl th { text-align:left; padding:11px 14px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--gold); border-bottom:1px solid var(--border-gold); background:rgba(255,255,255,0.03); }
table.tbl td { padding:11px 14px; font-size:14px; border-bottom:1px solid var(--border); }
table.tbl tr:hover td { background:rgba(255,255,255,0.02); }

/* CALENDAR */
.calendar { background:var(--surface2); border-radius:10px; overflow:hidden; border:1px solid var(--border); }
.cal-header { background:#FFFFFF; color:#000000; display:flex; align-items:center; justify-content:space-between; padding:12px 16px; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:16px; letter-spacing:1px; }
.cal-nav { background:transparent; border:none; cursor:pointer; color:#000000; font-size:20px; padding:0 6px; font-weight:bold; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); }
.cal-dh { background:var(--surface); padding:8px 2px; text-align:center; font-size:10px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
.cal-day { background:var(--surface); padding:8px 2px; text-align:center; font-size:13px; cursor:pointer; transition:all 0.15s; min-height:38px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; }
.cal-day:hover { background:rgba(255,255,255,0.07); color:var(--gold); }
.cal-day.today { color:var(--gold); font-weight:700; }
.cal-day.selected { background:rgba(255,255,255,0.12); color:var(--gold); }
.cal-day.has-data::after { content:''; width:6px; height:6px; background:#FFFFFF; border-radius:50%; display:block; }
.cal-day.empty { cursor:default; opacity:0.15; pointer-events:none; }

/* CHART */
.chart-wrap { display:flex; align-items:flex-end; gap:8px; height:130px; padding-top:10px; }
.bar-group { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.bars { display:flex; align-items:flex-end; gap:2px; height:100px; }
.bar { width:14px; border-radius:3px 3px 0 0; transition:height 0.5s; min-height:4px; }
.bar-p { background:#FFFFFF; }
.bar-a { background:var(--danger); opacity:0.7; }
.bar-lbl { font-size:10px; color:var(--text-dim); }

/* ALERTS */
.alert { padding:10px 16px; border-radius:8px; font-size:13px; margin-bottom:14px; }
.alert-error { background:rgba(255,68,68,0.1); border:1px solid rgba(255,68,68,0.3); color:var(--danger); }
.alert-success { background:rgba(68,255,136,0.1); border:1px solid rgba(68,255,136,0.3); color:var(--success); }

/* EMPTY STATE */
.empty { text-align:center; padding:36px 20px; color:var(--text-dim); }
.empty-icon { font-size:38px; margin-bottom:10px; }

/* UTILS */
.flex { display:flex; }
.gap2 { gap:8px; }
.gap3 { gap:12px; }
.aic { align-items:center; }
.jb { justify-content:space-between; }
.mb2 { margin-bottom:8px; }
.mb3 { margin-bottom:14px; }
.mb4 { margin-bottom:20px; }
.mt2 { margin-top:8px; }
.dim { color:var(--text-dim); font-size:13px; }
.gold { color:var(--gold); }
.bold { font-weight:700; }
.divider { border:none; border-top:1px solid var(--border); margin:14px 0; }
.legend-dot { width:12px; height:12px; border-radius:2px; display:inline-block; }

@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation:fadeIn 0.3s ease; }

/* INSTALL BUTTON */
#install-btn {
  display:none; align-items:center; gap:8px;
  background:#FFFFFF; color:#000000;
  border:none; border-radius:8px; padding:8px 16px;
  font-size:13px; font-weight:700; cursor:pointer;
  font-family:'Exo 2',sans-serif; animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0.3)} 50%{box-shadow:0 0 0 8px rgba(255,255,255,0)} }

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
  .auth-box { width:95vw; padding:28px 20px; }
  .auth-title { font-size:22px; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns:1fr; }
  .sidebar { display:none; }
  .main-layout { flex-direction:column; }
  .content { padding:16px; }
  .header { padding:0 14px; height:56px; }
  .logo-text { font-size:18px; }
  .user-badge { font-size:11px; padding:5px 10px; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .page-title { font-size:22px; }

  /* Bottom nav for mobile */
  .mobile-nav {
    display:flex !important;
    position:fixed; bottom:0; left:0; right:0;
    background:var(--darker); border-top:2px solid var(--gold);
    z-index:200; height:60px;
  }
  .main-layout { padding-bottom:60px; }
  .mobile-nav-item {
    flex:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:2px; cursor:pointer; color:var(--text-dim);
    font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;
    transition:all 0.2s; border:none; background:transparent; font-family:'Exo 2',sans-serif;
    padding:4px 2px;
  }
  .mobile-nav-item .mnav-icon { font-size:20px; }
  .mobile-nav-item.active { color:#FFFFFF; }
  .mobile-nav-item.active .mnav-icon { filter:drop-shadow(0 0 4px rgba(255,255,255,0.5)); }
  .stat-card { padding:14px; }
  .stat-number { font-size:28px; }
  .card { padding:16px; }
  .msg-bubble { max-width:95%; }
  .table-wrap { overflow-x:auto; }
  table.tbl { min-width:500px; }
  .btn-logout { font-size:11px; padding:5px 10px; }
}
@media (min-width:769px) {
  .mobile-nav { display:none !important; }
}

</head>
<body>

<!-- ========== AUTH SCREEN ========== -->
<div id="auth-screen" class="screen active">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-title">DIÁRIO DE BORDO</div>
      <div class="auth-subtitle">I.A Studio · Sistema de Relatórios</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Colaborador</button>
      <button class="auth-tab" onclick="switchAuthTab('manager')">Gestor</button>
    </div>
    <div id="auth-error" class="alert alert-error" style="display:none"></div>

    <!-- LOGIN -->
    <div id="tab-login">
      <div class="form-group"><label class="form-label">Login</label><input class="inp" id="l-login" placeholder="Seu login"></div>
      <div class="form-group"><label class="form-label">Senha</label><input class="inp" id="l-pass" type="password" placeholder="Sua senha" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Entrar</button>
    </div>

    <!-- REGISTER COLLABORATOR -->
    <div id="tab-register" style="display:none">
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Nome Completo</label><input class="inp" id="r-name" placeholder="Nome"></div>
        <div class="form-group"><label class="form-label">Cargo</label><input class="inp" id="r-role" placeholder="Cargo"></div>
      </div>
      <div class="form-group"><label class="form-label">Departamento</label><input class="inp" id="r-dept" placeholder="Departamento"></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Login</label><input class="inp" id="r-login" placeholder="Login único"></div>
        <div class="form-group"><label class="form-label">Senha</label><input class="inp" id="r-pass" type="password" placeholder="Senha"></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input class="inp" id="r-email" placeholder="seu@email.com"></div>
      <button class="btn btn-primary" style="width:100%" onclick="doRegister()">Cadastrar</button>
    </div>

    <!-- REGISTER MANAGER -->
    <div id="tab-manager" style="display:none">
      <div class="form-group"><label class="form-label">Código de Gestor *</label><input class="inp" id="m-code" type="password" placeholder="Código de acesso"></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Nome Completo</label><input class="inp" id="m-name" placeholder="Nome"></div>
        <div class="form-group"><label class="form-label">Cargo</label><input class="inp" id="m-role" placeholder="Cargo"></div>
      </div>
      <div class="form-group"><label class="form-label">Departamento</label><input class="inp" id="m-dept" placeholder="Departamento"></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Login</label><input class="inp" id="m-login" placeholder="Login único"></div>
        <div class="form-group"><label class="form-label">Senha</label><input class="inp" id="m-pass" type="password" placeholder="Senha"></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input class="inp" id="m-email" placeholder="seu@email.com"></div>
      <button class="btn btn-primary" style="width:100%" onclick="doManagerRegister()">Cadastrar como Gestor</button>
    </div>
  </div>
</div>

<!-- ========== COLLABORATOR SCREEN ========== -->
<div id="collab-screen" class="screen">
  <div class="header">
    <div><div class="logo-text">Diário de Bordo</div><div class="logo-sub">I.A Studio</div></div>
    <div class="header-user">
      <div class="user-badge" id="collab-badge">👤 —</div>
      <button id="install-btn" onclick="installApp()">📲 Instalar App</button>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="main-layout">
    <div class="sidebar">
      <div class="nav-item active" onclick="collabNav('dashboard',this)"><span class="nav-icon">📊</span> Dashboard</div>
      <div class="nav-item" onclick="collabNav('activities',this)"><span class="nav-icon">📝</span> Atividades</div>
      <div class="nav-item" onclick="collabNav('calendar',this)"><span class="nav-icon">📅</span> Calendário</div>
      <div class="nav-item" onclick="collabNav('tasks',this)"><span class="nav-icon">✅</span> Tarefas Recebidas</div>
      <div class="nav-item" onclick="collabNav('messages',this)"><span class="nav-icon">💬</span> Mensagens</div>
    </div>
    <div class="content" id="collab-content"></div>
  </div>
  <nav class="mobile-nav" id="collab-mobile-nav">
    <button class="mobile-nav-item active" onclick="collabNav('dashboard',this);updateMobileNav('collab-mobile-nav',this)"><span class="mnav-icon">📊</span>Dashboard</button>
    <button class="mobile-nav-item" onclick="collabNav('activities',this);updateMobileNav('collab-mobile-nav',this)"><span class="mnav-icon">📝</span>Atividades</button>
    <button class="mobile-nav-item" onclick="collabNav('calendar',this);updateMobileNav('collab-mobile-nav',this)"><span class="mnav-icon">📅</span>Calendário</button>
    <button class="mobile-nav-item" onclick="collabNav('tasks',this);updateMobileNav('collab-mobile-nav',this)"><span class="mnav-icon">✅</span>Tarefas</button>
    <button class="mobile-nav-item" onclick="collabNav('messages',this);updateMobileNav('collab-mobile-nav',this)"><span class="mnav-icon">💬</span>Mensagens</button>
  </nav>

<!-- ========== MANAGER SCREEN ========== -->
<div id="mgr-screen" class="screen">
  <div class="header">
    <div><div class="logo-text">Diário de Bordo</div><div class="logo-sub">I.A Studio · Gestão</div></div>
    <div class="header-user">
      <div class="user-badge" id="mgr-badge">⭐ —</div>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="main-layout">
    <div class="sidebar">
      <div class="nav-item active" onclick="mgrNav('dashboard',this)"><span class="nav-icon">📊</span> Dashboard</div>
      <div class="nav-item" onclick="mgrNav('my-activities',this)"><span class="nav-icon">📝</span> Minhas Atividades</div>
      <div class="nav-item" onclick="mgrNav('reports',this)"><span class="nav-icon">📋</span> Relatórios</div>
      <div class="nav-item" onclick="mgrNav('collaborators',this)"><span class="nav-icon">👥</span> Colaboradores</div>
      <div class="nav-item" onclick="mgrNav('tasks-send',this)"><span class="nav-icon">✅</span> Enviar Tarefas</div>
      <div class="nav-item" onclick="mgrNav('messages',this)"><span class="nav-icon">💬</span> Mensagens</div>
    </div>
    <div class="content" id="mgr-content"></div>
  </div>
  <nav class="mobile-nav" id="mgr-mobile-nav">
    <button class="mobile-nav-item active" onclick="mgrNav('dashboard',this);updateMobileNav('mgr-mobile-nav',this)"><span class="mnav-icon">📊</span>Painel</button>
    <button class="mobile-nav-item" onclick="mgrNav('reports',this);updateMobileNav('mgr-mobile-nav',this)"><span class="mnav-icon">📋</span>Relatórios</button>
    <button class="mobile-nav-item" onclick="mgrNav('tasks-send',this);updateMobileNav('mgr-mobile-nav',this)"><span class="mnav-icon">✅</span>Tarefas</button>
    <button class="mobile-nav-item" onclick="mgrNav('messages',this);updateMobileNav('mgr-mobile-nav',this)"><span class="mnav-icon">💬</span>Mensagens</button>
    <button class="mobile-nav-item" onclick="mgrNav('collaborators',this);updateMobileNav('mgr-mobile-nav',this)"><span class="mnav-icon">👥</span>Equipe</button>
  </nav>

<script>
// ============ STATE ============
const MANAGER_CODE = "12345";
let users = [
  { id:1, name:"Carlos Silva", role:"Desenvolvedor", department:"TI", login:"carlos", password:"123", email:"carlos@iastudio.com", type:"collaborator" },
  { id:2, name:"Ana Costa", role:"Designer", department:"Criação", login:"ana", password:"123", email:"ana@iastudio.com", type:"collaborator" }
];
let managers = [
  { id:1, name:"Roberto Lima", role:"Gestor Geral", department:"Gestão", login:"gestor", password:"admin", email:"gestor@iastudio.com", type:"manager" }
];
let activities = {
  1: {
    "2025-03-01":["Reunião de planejamento","Revisão de código"],
    "2025-03-02":["Desenvolvimento de feature","Testes unitários"],
    "2025-03-03":["Deploy em homologação"],
    "2025-03-04":["Correção de bugs","Code review"]
  },
  2: {
    "2025-03-01":["Criação de mockups","Reunião com cliente"],
    "2025-03-02":["Design de interfaces"],
    "2025-03-03":["Prototipagem"]
  }
};
let mgrActivities = {};
let messages = [
  { id:1, from:"gestor", fromName:"Roberto Lima", to:"all", toName:"Todos", text:"Bom dia time! Reunião às 10h hoje.", date:"2025-03-04" },
  { id:2, from:"gestor", fromName:"Roberto Lima", to:"carlos", toName:"Carlos Silva", text:"Carlos, pode verificar o deploy?", date:"2025-03-04" }
];
let tasks = [
  { id:1, from:"gestor", fromName:"Roberto Lima", to:"carlos", toName:"Carlos Silva", text:"Finalizar módulo de relatórios até sexta.", date:"2025-03-04", status:"pending" },
  { id:2, from:"gestor", fromName:"Roberto Lima", to:"all", toName:"Todos", text:"Atualizar documentação do projeto.", date:"2025-03-03", status:"pending" }
];
let currentUser = null;
let collabSelectedDay = todayStr();
let calViewDate = new Date();
let mgrCalViewDate = new Date();
let mgrSelectedDay = todayStr();
let currentCollabPage = 'dashboard';
let currentMgrPage = 'dashboard';
let reportFilterUser = 'all';
let reportFilterStart = '2025-03-01';
let reportFilterEnd = todayStr();

// ============ UTILS ============
function todayStr() { return new Date().toISOString().split('T')[0]; }
function formatDate(d) { return new Date(d+'T00:00:00').toLocaleDateString('pt-BR'); }
const MONTHS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const WDAYS = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

function esc(s) {
  const d=document.createElement('div'); d.textContent=s; return d.innerHTML;
}

// ============ AUTH ============
function switchAuthTab(tab) {
  ['login','register','manager'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? 'block':'none';
    document.querySelectorAll('.auth-tab')[['login','register','manager'].indexOf(t)].classList.toggle('active', t===tab);
  });
  hideAuthError();
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.style.display = 'block';
}
function hideAuthError() { document.getElementById('auth-error').style.display='none'; }

function doLogin() {
  const login = document.getElementById('l-login').value.trim();
  const pass = document.getElementById('l-pass').value;
  const all = [...users, ...managers];
  const found = all.find(u => u.login===login && u.password===pass);
  if (!found) { showAuthError('Login ou senha incorretos.'); return; }
  currentUser = found;
  if (found.type === 'manager') {
    document.getElementById('mgr-badge').textContent = '⭐ '+found.name+' — '+found.role;
    showScreen('mgr-screen');
    mgrNav('dashboard', document.querySelector('#mgr-screen .nav-item'));
  } else {
    document.getElementById('collab-badge').textContent = '👤 '+found.name+' — '+found.role;
    if (!activities[found.id]) activities[found.id] = {};
    showScreen('collab-screen');
    collabNav('dashboard', document.querySelector('#collab-screen .nav-item'));
  }
}

function doRegister() {
  const name=v('r-name'), role=v('r-role'), dept=v('r-dept'), login=v('r-login'), pass=v('r-pass'), email=v('r-email');
  if (!name||!role||!dept||!login||!pass||!email) { showAuthError('Preencha todos os campos.'); return; }
  if (users.find(u=>u.login===login)||managers.find(u=>u.login===login)) { showAuthError('Login já em uso.'); return; }
  const newU = { id: Date.now(), name, role, department:dept, login, password:pass, email, type:'collaborator' };
  users.push(newU);
  activities[newU.id] = {};
  alert('Cadastro realizado! Faça login.');
  switchAuthTab('login');
  document.getElementById('l-login').value = login;
  hideAuthError();
}

function doManagerRegister() {
  const code=v('m-code'), name=v('m-name'), role=v('m-role'), dept=v('m-dept'), login=v('m-login'), pass=v('m-pass'), email=v('m-email');
  if (code !== MANAGER_CODE) { showAuthError('Código de gestor inválido.'); return; }
  if (!name||!role||!dept||!login||!pass||!email) { showAuthError('Preencha todos os campos.'); return; }
  if (users.find(u=>u.login===login)||managers.find(u=>u.login===login)) { showAuthError('Login já em uso.'); return; }
  managers.push({ id: Date.now(), name, role, department:dept, login, password:pass, email, type:'manager' });
  alert('Gestor cadastrado! Faça login.');
  switchAuthTab('login');
  hideAuthError();
}

function doLogout() {
  currentUser = null;
  document.getElementById('l-login').value='';
  document.getElementById('l-pass').value='';
  showScreen('auth-screen');
}

function v(id) { return document.getElementById(id).value.trim(); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display='none'; });
  const el = document.getElementById(id);
  el.style.display = 'flex';
  el.classList.add('active');
}

// ============ COLLABORATOR NAV ============
function collabNav(page, el) {
  currentCollabPage = page;
  document.querySelectorAll('#collab-screen .nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  renderCollabPage(page);
}

function renderCollabPage(page) {
  const acts = activities[currentUser.id] || {};
  const todayActs = acts[todayStr()] || [];
  const myTasks = tasks.filter(t => t.to==='all' || t.to===currentUser.login);
  const myMsgs = messages.filter(m => m.to==='all' || m.to===currentUser.login || m.from===currentUser.login);
  const totalDays = Object.keys(acts).length;
  const totalActs = Object.values(acts).reduce((a,b)=>a+b.length,0);
  let html = '';

  if (page==='dashboard') {
    html = `
    <div class="page-title">Dashboard</div>
    <div class="page-subtitle">Bem-vindo, ${esc(currentUser.name)}! Aqui está seu resumo.</div>
    <div class="grid-4">
      ${statCard(totalDays,'Dias Registrados')}
      ${statCard(totalActs,'Total de Atividades')}
      ${statCard(todayActs.length,'Atividades Hoje')}
      ${statCard(myTasks.length,'Tarefas Recebidas')}
    </div>
    <div class="grid-2">
      <div class="card card-gold">
        <div class="card-title">📝 Atividades de Hoje</div>
        ${todayActs.length===0 ? emptyState('📋','Nenhuma atividade hoje.') : todayActs.map(a=>`<div class="activity-item"><div class="activity-dot"></div><div class="activity-text">${esc(a)}</div></div>`).join('')}
      </div>
      <div class="card card-gold">
        <div class="card-title">📋 Tarefas do Gestor</div>
        ${myTasks.length===0 ? emptyState('✅','Nenhuma tarefa.') : myTasks.slice(0,4).map(t=>`<div class="activity-item"><div class="activity-dot"></div><div><div class="activity-text">${esc(t.text)}</div><div class="dim">De: ${esc(t.fromName)} · ${formatDate(t.date)}</div></div></div>`).join('')}
      </div>
    </div>`;
  }

  else if (page==='activities') {
    const today = todayStr();
    html = `
    <div class="page-title">Minhas Atividades</div>
    <div class="page-subtitle">Registre as atividades do dia (${formatDate(today)}).</div>
    <div class="card card-gold">
      <div class="card-title">➕ Adicionar Atividade</div>
      <div class="flex gap2 mb3">
        <input class="inp" id="new-act" placeholder="Descreva sua atividade..." onkeydown="if(event.key==='Enter')addCollabActivity()" style="flex:1">
        <button class="btn btn-primary" onclick="addCollabActivity()">Adicionar</button>
      </div>
      <div id="act-list">
        ${renderActList(todayActs, today)}
      </div>
    </div>`;
  }

  else if (page==='calendar') {
    html = `
    <div class="page-title">Calendário</div>
    <div class="page-subtitle">Clique em um dia para ver as atividades registradas.</div>
    <div class="grid-2">
      <div>${renderCalendar(calViewDate, acts, collabSelectedDay, 'collabCalNav','collabSelectDay')}</div>
      <div class="card card-gold">
        <div class="card-title">📅 ${formatDate(collabSelectedDay)}</div>
        <div id="cal-day-acts">${renderActList(acts[collabSelectedDay]||[], collabSelectedDay)}</div>
      </div>
    </div>`;
  }

  else if (page==='tasks') {
    html = `
    <div class="page-title">Tarefas Recebidas</div>
    <div class="page-subtitle">Tarefas atribuídas pelo gestor.</div>
    ${myTasks.length===0 ? `<div class="card">${emptyState('✅','Nenhuma tarefa atribuída.')}</div>` :
      myTasks.map(t=>`
      <div class="card card-gold">
        <div class="flex aic jb mb2"><span class="bold">${esc(t.text)}</span><span class="tag ${t.status==='pending'?'tag-gold':'tag-success'}">${t.status==='pending'?'Pendente':'Concluída'}</span></div>
        <div class="dim">De: ${esc(t.fromName)} · ${formatDate(t.date)} · Para: ${esc(t.toName)}</div>
      </div>`).join('')}`;
  }

  else if (page==='messages') {
    html = `
    <div class="page-title">Mensagens</div>
    <div class="page-subtitle">Comunicação com o gestor.</div>
    <div class="card mb3">
      <div class="msg-list" id="msg-list">${renderMsgs(myMsgs, currentUser.login)}</div>
    </div>
    <div class="flex gap2">
      <input class="inp" id="new-msg" placeholder="Enviar mensagem ao gestor..." style="flex:1" onkeydown="if(event.key==='Enter')sendCollabMsg()">
      <button class="btn btn-primary" onclick="sendCollabMsg()">Enviar</button>
    </div>`;
  }

  document.getElementById('collab-content').innerHTML = html;
  if (page==='messages') scrollMsgs('msg-list');
}

function addCollabActivity() {
  const inp = document.getElementById('new-act');
  const val = inp.value.trim();
  if (!val) return;
  const today = todayStr();
  if (!activities[currentUser.id]) activities[currentUser.id]={};
  if (!activities[currentUser.id][today]) activities[currentUser.id][today]=[];
  activities[currentUser.id][today].push(val);
  inp.value='';
  document.getElementById('act-list').innerHTML = renderActList(activities[currentUser.id][today], today);
}

function removeCollabActivity(day, idx) {
  activities[currentUser.id][day].splice(idx,1);
  if (currentCollabPage==='activities') {
    document.getElementById('act-list').innerHTML = renderActList(activities[currentUser.id][todayStr()]||[], todayStr());
  } else if (currentCollabPage==='calendar') {
    document.getElementById('cal-day-acts').innerHTML = renderActList(activities[currentUser.id][day]||[], day);
  }
}

function collabCalNav(dir) {
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth()+dir, 1);
  renderCollabPage('calendar');
}

function collabSelectDay(day) {
  collabSelectedDay = day;
  renderCollabPage('calendar');
}

function sendCollabMsg() {
  const inp = document.getElementById('new-msg');
  const text = inp.value.trim();
  if (!text) return;
  messages.push({ id:Date.now(), from:currentUser.login, fromName:currentUser.name, to:'gestor', toName:'Gestor', text, date:todayStr() });
  inp.value='';
  const myMsgs = messages.filter(m=>m.to==='all'||m.to===currentUser.login||m.from===currentUser.login);
  document.getElementById('msg-list').innerHTML = renderMsgs(myMsgs, currentUser.login);
  scrollMsgs('msg-list');
}

// ============ MANAGER NAV ============
function mgrNav(page, el) {
  currentMgrPage = page;
  document.querySelectorAll('#mgr-screen .nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  renderMgrPage(page);
}

function renderMgrPage(page) {
  let html='';
  const today = todayStr();
  const todayActs = mgrActivities[today]||[];

  if (page==='dashboard') {
    // chart last 7 days
    const dates=[];
    for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toISOString().split('T')[0]);}
    const chartBars = dates.map(date=>{
      const present=users.filter(u=>activities[u.id]&&activities[u.id][date]&&activities[u.id][date].length>0).length;
      const absent=users.length-present;
      const maxH=90;
      const ph=users.length?(present/users.length)*maxH:4;
      const ah=users.length?(absent/users.length)*maxH:4;
      return `<div class="bar-group"><div class="bars"><div class="bar bar-p" style="height:${ph}px" title="Presentes: ${present}"></div><div class="bar bar-a" style="height:${ah}px" title="Ausentes: ${absent}"></div></div><div class="bar-lbl">${date.slice(8)}/${date.slice(5,7)}</div></div>`;
    }).join('');

    const totalDaysAll=Object.values(activities).reduce((a,u)=>a+Object.keys(u).length,0);
    html=`
    <div class="page-title">Painel do Gestor</div>
    <div class="page-subtitle">Visão geral da equipe I.A Studio.</div>
    <div class="grid-4">
      ${statCard(users.length,'Colaboradores')}
      ${statCard(tasks.length,'Tarefas Enviadas')}
      ${statCard(messages.length,'Mensagens')}
      ${statCard(totalDaysAll,'Dias Registrados')}
    </div>
    <div class="card card-gold mb4">
      <div class="card-title">📈 Atividade por Dia (últimos 7 dias)</div>
      <div class="chart-wrap">${chartBars}</div>
      <div class="flex gap3 mt2">
        <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)"><span class="legend-dot" style="background:#FFFFFF"></span>Com registro</span>
        <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)"><span class="legend-dot" style="background:var(--danger);opacity:.7"></span>Sem registro</span>
      </div>
    </div>
    <div class="card card-gold">
      <div class="card-title">👥 Time</div>
      <table class="tbl">
        <thead><tr><th>Nome</th><th>Cargo</th><th>Departamento</th><th>Dias Registrados</th></tr></thead>
        <tbody>${users.map(u=>`<tr><td class="bold">${esc(u.name)}</td><td>${esc(u.role)}</td><td>${esc(u.department)}</td><td><span class="tag tag-gold">${Object.keys(activities[u.id]||{}).length}</span></td></tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  else if (page==='my-activities') {
    html=`
    <div class="page-title">Minhas Atividades</div>
    <div class="page-subtitle">Registre suas próprias atividades como gestor.</div>
    <div class="grid-2">
      <div class="card card-gold">
        <div class="card-title">➕ Adicionar — Hoje (${formatDate(today)})</div>
        <div class="flex gap2 mb3">
          <input class="inp" id="mgr-new-act" placeholder="Descreva a atividade..." style="flex:1" onkeydown="if(event.key==='Enter')addMgrActivity()">
          <button class="btn btn-primary" onclick="addMgrActivity()">Add</button>
        </div>
        <div id="mgr-act-list">${renderActList(todayActs, today, true)}</div>
      </div>
      <div>${renderCalendar(mgrCalViewDate, mgrActivities, mgrSelectedDay, 'mgrCalNav','mgrSelectDay')}</div>
    </div>`;
  }

  else if (page==='reports') {
    const filterOpts=`<option value="all">Todos</option>${users.map(u=>`<option value="${u.login}" ${reportFilterUser===u.login?'selected':''}>${esc(u.name)}</option>`).join('')}`;
    const filteredUsers = reportFilterUser==='all' ? users : users.filter(u=>u.login===reportFilterUser);
    const reportsHtml = filteredUsers.map(u=>{
      const acts=activities[u.id]||{};
      const filtered=Object.entries(acts).filter(([d])=>d>=reportFilterStart&&d<=reportFilterEnd);
      return `
      <div class="card card-gold mb3">
        <div class="card-title">👤 ${esc(u.name)} <span class="tag tag-gold" style="margin-left:8px">${esc(u.role)}</span></div>
        ${filtered.length===0?`<div class="dim">Nenhuma atividade no período.</div>`:
          filtered.map(([date,items])=>`
          <div class="mb2">
            <div class="bold gold" style="font-size:13px;margin-bottom:6px">📅 ${formatDate(date)}</div>
            ${items.map(item=>`<div class="activity-item"><div class="activity-dot"></div><div class="activity-text">${esc(item)}</div></div>`).join('')}
          </div>`).join('')}
      </div>`;
    }).join('');
    html=`
    <div class="page-title">Relatórios</div>
    <div class="page-subtitle">Avalie as atividades dos colaboradores.</div>
    <div class="card mb3">
      <div class="card-title">🔍 Filtros</div>
      <div class="grid-3">
        <div class="form-group"><label class="form-label">Colaborador</label>
          <select class="inp" onchange="reportFilterUser=this.value;renderMgrPage('reports')">${filterOpts}</select>
        </div>
        <div class="form-group"><label class="form-label">Data Início</label>
          <input class="inp" type="date" value="${reportFilterStart}" onchange="reportFilterStart=this.value;renderMgrPage('reports')">
        </div>
        <div class="form-group"><label class="form-label">Data Fim</label>
          <input class="inp" type="date" value="${reportFilterEnd}" onchange="reportFilterEnd=this.value;renderMgrPage('reports')">
        </div>
      </div>
    </div>
    ${reportsHtml||`<div class="card">${emptyState('📭','Nenhum resultado encontrado.')}</div>`}`;
  }

  else if (page==='collaborators') {
    html=`
    <div class="page-title">Colaboradores</div>
    <div class="page-subtitle">Todos os colaboradores cadastrados.</div>
    <div class="card">
      <table class="tbl">
        <thead><tr><th>Nome</th><th>Login</th><th>Cargo</th><th>Depto</th><th>Email</th></tr></thead>
        <tbody>${users.map(u=>`<tr><td class="bold">${esc(u.name)}</td><td class="dim">${esc(u.login)}</td><td>${esc(u.role)}</td><td><span class="tag tag-gold">${esc(u.department)}</span></td><td class="dim">${esc(u.email)}</td></tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  else if (page==='tasks-send') {
    const toOpts=`<option value="all">Todos</option>${users.map(u=>`<option value="${u.login}">${esc(u.name)}</option>`).join('')}`;
    html=`
    <div class="page-title">Enviar Tarefas</div>
    <div class="page-subtitle">Atribua tarefas ao time ou individualmente.</div>
    <div class="card card-gold mb3">
      <div class="card-title">📋 Nova Tarefa</div>
      <div class="form-group"><label class="form-label">Para</label><select class="inp" id="task-to">${toOpts}</select></div>
      <div class="form-group"><label class="form-label">Descrição</label><textarea class="inp" id="task-text" placeholder="Descreva a tarefa..."></textarea></div>
      <button class="btn btn-primary" onclick="sendTask()">Enviar Tarefa</button>
    </div>
    <div class="card">
      <div class="card-title">📜 Histórico de Tarefas</div>
      ${tasks.length===0?emptyState('✅','Nenhuma tarefa enviada.'):`
      <table class="tbl">
        <thead><tr><th>Tarefa</th><th>Para</th><th>Data</th><th>Status</th></tr></thead>
        <tbody>${[...tasks].reverse().map(t=>`<tr><td>${esc(t.text)}</td><td>${esc(t.toName)}</td><td>${formatDate(t.date)}</td><td><span class="tag ${t.status==='pending'?'tag-gold':'tag-success'}">${t.status==='pending'?'Pendente':'Concluída'}</span></td></tr>`).join('')}</tbody>
      </table>`}
    </div>`;
  }

  else if (page==='messages') {
    const toOpts=`<option value="all">Todos</option>${users.map(u=>`<option value="${u.login}">${esc(u.name)}</option>`).join('')}`;
    html=`
    <div class="page-title">Mensagens</div>
    <div class="page-subtitle">Comunique-se com o time.</div>
    <div class="card card-gold mb3">
      <div class="card-title">✉️ Nova Mensagem</div>
      <div class="form-group"><label class="form-label">Para</label><select class="inp" id="mgr-msg-to">${toOpts}</select></div>
      <div class="form-group"><label class="form-label">Mensagem</label><textarea class="inp" id="mgr-msg-text" placeholder="Escreva sua mensagem..." style="min-height:70px"></textarea></div>
      <button class="btn btn-primary" onclick="sendMgrMsg()">Enviar</button>
    </div>
    <div class="card">
      <div class="card-title">📬 Histórico</div>
      <div class="msg-list" id="mgr-msg-list">${renderMsgs([...messages].reverse(), currentUser.login)}</div>
    </div>`;
  }

  document.getElementById('mgr-content').innerHTML = html;
}

function addMgrActivity() {
  const inp=document.getElementById('mgr-new-act');
  const val=inp.value.trim(); if(!val)return;
  const today=todayStr();
  if(!mgrActivities[today])mgrActivities[today]=[];
  mgrActivities[today].push(val);
  inp.value='';
  document.getElementById('mgr-act-list').innerHTML=renderActList(mgrActivities[today],today,true);
}

function removeMgrActivity(day,idx) {
  mgrActivities[day].splice(idx,1);
  document.getElementById('mgr-act-list').innerHTML=renderActList(mgrActivities[day]||[],day,true);
}

function mgrCalNav(dir){
  mgrCalViewDate=new Date(mgrCalViewDate.getFullYear(),mgrCalViewDate.getMonth()+dir,1);
  renderMgrPage('my-activities');
}

function mgrSelectDay(day){
  mgrSelectedDay=day;

function sendTask(){
  const to=document.getElementById('task-to').value;
  const text=document.getElementById('task-text').value.trim();
  if(!text)return;
  const toUser=users.find(u=>u.login===to);
  tasks.push({id:Date.now(),from:currentUser.login,fromName:currentUser.name,to,toName:to==='all'?'Todos':toUser?.name||to,text,date:todayStr(),status:'pending'});
  renderMgrPage('tasks-send');
}

function sendMgrMsg(){
  const to=document.getElementById('mgr-msg-to').value;
  const text=document.getElementById('mgr-msg-text').value.trim();
  if(!text)return;
  const toUser=users.find(u=>u.login===to);
  messages.push({id:Date.now(),from:currentUser.login,fromName:currentUser.name,to,toName:to==='all'?'Todos':toUser?.name||to,text,date:todayStr()});
  renderMgrPage('messages');
}

// ============ SHARED RENDER HELPERS ============
function statCard(n,l){return `<div class="stat-card"><div class="stat-number">${n}</div><div class="stat-label">${l}</div></div>`;}

function emptyState(icon,txt){return `<div class="empty"><div class="empty-icon">${icon}</div><p>${txt}</p></div>`;}

function renderActList(list, day, isMgr=false) {
  if(!list||list.length===0)return emptyState('📭','Nenhuma atividade registrada.');
  const fn=isMgr?`removeMgrActivity`:`removeCollabActivity`;
  return list.map((a,i)=>`
    <div class="activity-item">
      <div class="activity-dot"></div>
      <div class="activity-text">${esc(a)}</div>
      <button class="btn-danger-sm" onclick="${fn}('${day}',${i})">✕</button>
    </div>`).join('');
}

function renderMsgs(list, myLogin){
  if(!list||list.length===0)return emptyState('💬','Nenhuma mensagem.');
  return list.map(m=>{
    const mine=m.from===myLogin;
    return `<div class="msg-bubble ${mine?'msg-sent':'msg-received'}">
      <div class="msg-meta">${mine?'Você':esc(m.fromName)} → ${esc(m.toName)} · ${formatDate(m.date)}</div>
      <div class="msg-text">${esc(m.text)}</div>
    </div>`;
  }).join('');
}

function scrollMsgs(id){const el=document.getElementById(id);if(el)el.scrollTop=el.scrollHeight;}

function renderCalendar(viewDate, acts, selectedDay, navFn, selectFn){
  const year=viewDate.getFullYear(), month=viewDate.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayS=todayStr();
  let cells='';
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasData=acts&&acts[dateStr]&&acts[dateStr].length>0;
    const cls=['cal-day',dateStr===todayS?'today':'',dateStr===selectedDay?'selected':'',hasData?'has-data':''].join(' ').trim();
    cells+=`<div class="${cls}" onclick="${selectFn}('${dateStr}')">${d}</div>`;
  }
  return `<div class="calendar">
    <div class="cal-header">
      <button class="cal-nav" onclick="${navFn}(-1)">‹</button>
      <span>${MONTHS[month]} ${year}</span>
      <button class="cal-nav" onclick="${navFn}(1)">›</button>
    </div>
    <div class="cal-grid">
      ${WDAYS.map(w=>`<div class="cal-dh">${w}</div>`).join('')}
      ${cells}
    </div>
  </div>`;
}

// ============ LOCALSTORAGE PERSISTENCE ============
function saveData() {
  try {
    localStorage.setItem('db_users', JSON.stringify(users));
    localStorage.setItem('db_managers', JSON.stringify(managers));
    localStorage.setItem('db_activities', JSON.stringify(activities));
    localStorage.setItem('db_mgrActivities', JSON.stringify(mgrActivities));
    localStorage.setItem('db_messages', JSON.stringify(messages));
    localStorage.setItem('db_tasks', JSON.stringify(tasks));
  } catch(e) {}
}

function loadData() {
  try {
    const u = localStorage.getItem('db_users'); if(u) users = JSON.parse(u);
    const m = localStorage.getItem('db_managers'); if(m) managers = JSON.parse(m);
    const a = localStorage.getItem('db_activities'); if(a) activities = JSON.parse(a);
    const ma = localStorage.getItem('db_mgrActivities'); if(ma) mgrActivities = JSON.parse(ma);
    const msg = localStorage.getItem('db_messages'); if(msg) messages = JSON.parse(msg);
    const t = localStorage.getItem('db_tasks'); if(t) tasks = JSON.parse(t);
  } catch(e) {}
}

  el.classList.add('active');
}

// ============ INSTALL PROMPT ============
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById('install-btn');
  if(btn) btn.style.display = 'flex';
});

function installApp() {
  if(deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      const btn = document.getElementById('install-btn');
      if(btn) btn.style.display = 'none';
    });
  }
}

window.addEventListener('appinstalled', () => {
  const btn = document.getElementById('install-btn');
  if(btn) btn.style.display = 'none';
});
</script>
